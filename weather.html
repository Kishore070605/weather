<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather forecast</title>
</head>

<body class="text-primary vh-100 d-flex justify-content-center align-items-center">
    <img class="bg-img" src="weather.jpg" srcset="weather@2x.jpg 2x" alt="weather background">
    <form class=" d-flex justify-content-center aline-item-center card form-card shadow">
        <div class="card-body">
        <h1 class="text-primary" >WEATHER FORECAST</h1>
        <div class="d-flex   gap-1">
            <input type="text" id="inputbox" class="form-control" >
            <button type="submit" id="searchbutton" class="btn btn-danger" onclick="weather(event)" >search</button>
        </div>

            <div id="cointainer" class="text-primary  d-flex flex-column justify-content-center align-items-center">

            </div>
        </div>
    </form>

</body>
    <script src="script.js"></script>
    <style>
    .bg-img{
        position:fixed;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        z-index:-1;
    }
    .form-card{
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(6px) saturate(120%);
        border-radius: .5rem;
        padding: .5rem;
    }
    </style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
